<!doctype html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;height:100%;background:#070b09;color:#f2f5f3;font-family:Inter,system-ui,sans-serif;overflow:hidden}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;text-align:center}
  .flag{font-size:84px;animation:pop .8s ease}
  h1{font-size:64px;margin:0;letter-spacing:-1px;animation:rise 1s ease}
  p{font-size:26px;color:#c0c9c4;margin:0;max-width:900px;line-height:1.5;animation:rise 1.2s ease}
  .chips{display:flex;gap:12px;margin-top:10px;animation:rise 1.4s ease}
  .chip{border:1px solid #27362f;border-radius:999px;padding:8px 18px;font-size:17px;color:#8a958f}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:none}}
</style></head><body>
<div class="wrap">
  <div class="flag">🏁</div>
  <h1>Final Whistle</h1>
  <p>Trustless World Cup prediction markets on Solana —<br/>settled the second the whistle blows, by <b>TxLINE Merkle proofs</b> instead of trust.</p>
  <div class="chips"><span class="chip">Parimutuel SOL escrow</span><span class="chip">CPI → validate_stat_v2</span><span class="chip">Verifiable receipts</span></div>
</div>
</body></html>
